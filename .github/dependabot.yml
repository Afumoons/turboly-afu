version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    # Freeze dependency PR noise during the coding challenge review.
    # The submitted app is already verified against the locked bundle.
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    # Freeze workflow dependency PR noise during the coding challenge review.
    open-pull-requests-limit: 0
    ignore:
      - dependency-name: "*"
